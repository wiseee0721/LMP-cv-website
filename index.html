                const saved = localStorage.getItem('theme');
                return saved || 'light';

            const [modal, setModal] = useState({ type: null, data: null });

                localStorage.setItem('theme', theme);
                document.body.className = theme === 'dark' ? 'dark-mode' : 'light-mode';
            }, [theme]);

            const toggleTheme = () => {
                setTheme(prev => prev === 'light' ? 'dark' : 'light');
            };

            const showToast = (message, duration = 3000) => {
                setToast(message);
                setTimeout(() => setToast(null), duration);
            };

            const openModal = (type, data = null) => {
                setModal({ type, data });
            };

            const closeModal = () => {
                setModal({ type: null, data: null });
            };

            return (
                <AppContext.Provider value={{
                    theme,
                    toggleTheme,
                    toast,
                    showToast,
                    modal,
                    openModal,
                    closeModal,
                    activeSection,
                    setActiveSection

首先是成长空间。我希望自己能进入一个愿意鼓励学习、也愿意给新人实践机会的环境，让我不仅能输出当下的技能，更能不断接触到新的知识边界，在解决具有挑战性的实际问题中，实现个人能力的快速迭代。

其次是工作价值。我希望自己做的工作不是无意义的消耗，而是能切实产生正向的反馈。无论是帮用户解决了一个具体的痛点，还是帮一个品牌传递出了它应该被听见的声音——这种"我做的事情正在让某些改变发生"的确定感，是我保持自驱与持续投入的核心动力。`

                    title: '视觉体验',

                    options: ['廉价辣眼', '有点违和', '整洁舒服', '非常舒适', '赏心悦目']

                {
                    key: 'highlight',
                    title: '个人亮点',
                    subtitle: '核心优势与差异化竞争力是否突出，能否让人留下深刻印象？',
                    options: ['毫无印象', '印象一般', '稍有记忆', '印象很深', '过目不忘']

                    content: '内容结构',
                    visual: '视觉体验',
                    highlight: '个人亮点',
                    overall: '总体印象'
                };
                
                const ratingEmojis = { 1: '⭐', 2: '⭐⭐', 3: '⭐⭐⭐', 4: '⭐⭐⭐⭐', 5: '⭐⭐⭐⭐⭐' };
                
                const feedbackData = {
                    msg_type: 'interactive',
                    card: {
                        config: { wide_screen_mode: true },
                        header: {
                            title: { tag: 'plain_text', content: '🌱 收到新的简历网站反馈！' },
                            template: 'green'
                        },
                        elements: [

                                tag: 'div',

                            {
                                tag: 'div',
                                text: {
                                    tag: 'lark_md',
                                    content: '**📊 四维度评分**'
                                }
                            },
                            ...ratingDimensions.map(dim => ({
                                tag: 'div',
                                text: {
                                    tag: 'lark_md',
                                    content: `• **${dim.title}：** ${ratingEmojis[ratings[dim.key]] || '未评分'} \`${dim.options[ratings[dim.key] - 1] || '未评价'}\``
                                }
                            })),
                            ...(suggestion.trim() ? [
                                { tag: 'hr' },
                                {
                                    tag: 'div',
                                    text: {
                                        tag: 'lark_md',
                                        content: '**💬 用户建议**'
                                    }
                                },
                                {
                                    tag: 'div',
                                    text: {
                                        tag: 'lark_md',
                                        content: suggestion
                                    }
                                }
                            ] : [])
                        ]
                    }
                };
                
                try {
                    await fetch(feishuWebhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(feedbackData)
                    });
                } catch (error) {
                    console.error('发送反馈失败:', error);
                }
                
                setSubmitted(true);
            };

            return (
                <div id="qa" className="min-h-screen py-20">
                    {viewingImage && (
                        <div 
                            className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4"
                            onClick={() => setViewingImage(null)}
                        >
                            <img 
                                src={viewingImage}

                            ))}
                        </div>

                        <div className={`${theme === 'dark' ? 'bg-dark-card' : 'bg-white'} rounded-xl p-6 animate-fade-in-up`}>
                            {!submitted ? (
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="mb-6">
                                        <h4 className="text-lg font-bold text-primary mb-4 text-left">
                                            为小树苗浇浇水 🌱
                                        </h4>
                                        <div className="text-xs text-gray-500 dark:text-gray-400 space-y-2 leading-relaxed border-l-2 border-primary pl-4">

                                            <p>作为一个准备进入职场的小树苗，我非常希望能得到您的专业意见！</p>

                                            <p>整个反馈过程仅需 1-2 分钟，您可以通过下方的快速评分和文字留言给我建议。</p>
                                            <p>所有反馈均为匿名，不会关联您的个人信息，请放心填写。</p>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-sm font-medium text-gray-600 dark:text-gray-300">

                                                <div className="flex items-center gap-3">
                                                    <div className="flex gap-1">
                                                        {[1, 2, 3, 4, 5].map((star) => (
                                                            <button
                                                                key={star}
                                                                type="button"
                                                                onClick={() => {
                                                                    setRatings({...ratings, [dim.key]: star});
                                                                }}
                                                                onMouseEnter={() => setHoverRating({...hoverRating, [dim.key]: star})}
                                                                onMouseLeave={() => setHoverRating({...hoverRating, [dim.key]: 0})}
                                                                className="focus:outline-none"
                                                            >
                                                                <span
                                                                    className={`text-xl transition-colors ${
                                                                        star <= (hoverRating[dim.key] || ratings[dim.key])
                                                                            ? 'text-yellow-500'
                                                                            : 'text-gray-300 dark:text-gray-600'
                                                                    }`}
                                                                >
                                                                    ★
                                                                </span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                    {ratings[dim.key] > 0 && (
                                                        <span className="text-xs text-primary font-medium whitespace-nowrap">

                                            </div>
                                        ))}

您的每一句话对我而言都是珍贵的养分☀️"
                                        value={suggestion}
                                        onChange={(e) => setSuggestion(e.target.value)}
                                        className={`w-full px-4 py-3 border rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-primary h-28 text-sm ${
                                            theme === 'dark' ? 'bg-dark-bg border-gray-600 text-white placeholder-gray-500' : 'bg-gray-50 border-gray-300 text-gray-800 placeholder-gray-400'
                                        }`}

                                    <button
                                        type="submit"

        const NotFoundPage = () => {
            return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="text-center">
                        <h1 className="text-9xl font-bold text-primary mb-4">404</h1>
                        <p className="text-2xl mb-8">哎呀,你好像迷路了!</p>
                        <button
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                            className="px-8 py-4 bg-primary text-white rounded-lg hover:bg-green-700 transition-colors"
                        >
                            点击这里回到首页
                        </button>
                    </div>
                </div>
            );
        };

        // 主应用
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const { setActiveSection } = useAppStore();

            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['about', 'skills', 'netease', 'southern', 'qa'];
                    const scrollPosition = window.scrollY + window.innerHeight / 3;

                    for (const section of sections) {
                        const element = document.getElementById(section);
                        if (element) {
                            const { offsetTop, offsetHeight } = element;
                            if (scrollPosition >= offsetTop && scrollPosition < offsetTop + offsetHeight) {
                                setActiveSection(section);
                                break;
                            }
                        }
                    }
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [setActiveSection]);

            return (
                <div className="min-h-screen">
                    <Navbar />
                    <main>
                        <HomePage />
                        <SkillsPage />
                        <ExperiencePage experience={resumeData.experiences[1]} id="netease" customTitle="实习经历A-网易" />
                        <ExperiencePage experience={resumeData.experiences[0]} id="southern" customTitle="实习经历B-南方周末" />
                        <QAPage />
                    </main>
                    <Footer />
                    <Toast />
                    <WechatModal />
                </div>
            );
        };

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>
